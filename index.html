<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exclusive Fan Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0b0b0b;
font-family:'Segoe UI',sans-serif;
color:white;
}

.navbar{
background:rgba(0,0,0,.7);
backdrop-filter:blur(20px);
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.9)),
url('https://picsum.photos/1920/1080?20');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:70px;
font-weight:800;
}

.hero p{
font-size:22px;
color:#ddd;
max-width:700px;
margin:auto;
}

.btn-telegram{
background:#229ED9;
color:white;
padding:15px 40px;
border-radius:50px;
font-size:20px;
font-weight:bold;
text-decoration:none;
display:inline-block;
margin-top:25px;
}

.btn-telegram:hover{
color:white;
transform:scale(1.05);
}

.section-title{
font-size:42px;
font-weight:bold;
text-align:center;
margin-bottom:40px;
}

.gallery{
column-count:4;
column-gap:15px;
}

.gallery img{
width:100%;
margin-bottom:15px;
border-radius:18px;
cursor:pointer;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

.telegram-float{
position:fixed;
bottom:25px;
right:25px;
background:#229ED9;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
z-index:9999;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.footer{
background:#050505;
padding:40px;
text-align:center;
margin-top:60px;
color:#888;
}

@media(max-width:992px){
.gallery{
column-count:3;
}
.hero h1{
font-size:50px;
}
}

@media(max-width:768px){
.gallery{
column-count:2;
}
.hero h1{
font-size:40px;
}
}

@media(max-width:480px){
.gallery{
column-count:1;
}
}

</style>

</head>

<body>

<nav class="navbar navbar-dark fixed-top">
<div class="container">

<a class="navbar-brand fw-bold">
EXCLUSIVE FAN GALLERY
</a>

<a href="https://t.me/YOUR_TELEGRAM_USERNAME"
target="_blank"
class="btn btn-warning">
Join Telegram </a>

</div>
</nav>

<section class="hero">

<div>

<h1>Welcome To My Exclusive Gallery</h1>

<p>
Discover exclusive photos, special moments,
and premium content shared with my fans.
</p>

<a href="https://t.me/YOUR_TELEGRAM_USERNAME"
target="_blank"
class="btn-telegram">

📸 Join My Telegram Channel

</a>

</div>

</section>

<section class="container py-5">

<h2 class="section-title">
Latest Gallery
</h2>

<div class="gallery">

<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
<img src="5.jpg">
<img src="6.jpg">
<img src="7.jpg">
<img src="8.jpg">
<img src="9.jpg">
<img src="10.jpg">
<img src="11.jpg">
<img src="12.jpg">

</div>

</section>

<footer class="footer">

© 2026 Exclusive Fan Gallery. All Rights Reserved.

</footer>

<a href="https://t.me/YOUR_TELEGRAM_USERNAME"
target="_blank"
class="telegram-float">

✈️

</a>

<div class="modal fade" id="photoModal">
<div class="modal-dialog modal-xl modal-dialog-centered">
<div class="modal-content bg-dark border-0">
<img id="modalImage" class="img-fluid">
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

document.querySelectorAll('.gallery img')
.forEach(img=>{

img.addEventListener('click',()=>{

document.getElementById('modalImage').src=img.src;

new bootstrap.Modal(
document.getElementById('photoModal')
).show();

});

});

</script>

</body>
</html>
